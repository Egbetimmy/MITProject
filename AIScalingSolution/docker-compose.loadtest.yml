services:
  redis:
    image: redis:7-alpine
    container_name: aiscaling-loadtest-redis
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  stress-api:
    build:
      context: .
      dockerfile: StressTest/Api/Dockerfile
    container_name: aiscaling-stress-api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      PredictiveMiddleware__Redis__ConnectionString: redis:6379
      PredictiveMiddleware__Redis__KeyPrefix: api:telemetry:v1
      PredictiveMiddleware__Diagnostics__IntervalSeconds: 2
    ports:
      - "5000:8080"
