services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aiscaling-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_strong_Password123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  userservice:
    build:
      context: .
      dockerfile: UserService/Api/Dockerfile
    container_name: userservice
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=UserDb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;"

  productservice:
    build:
      context: .
      dockerfile: ProductService/Api/Dockerfile
    container_name: productservice
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ProductDb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;"

  orderservice:
    build:
      context: .
      dockerfile: OrderService/Api/Dockerfile
    container_name: orderservice
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=OrderDb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;"

  monitoringservice:
    build:
      context: .
      dockerfile: MonitoringService/Api/Dockerfile
    container_name: monitoringservice
    depends_on:
      sqlserver:
        condition: service_healthy
      userservice:
        condition: service_started
      productservice:
        condition: service_started
      orderservice:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=MonitoringDb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;"

  predictionservice:
    build:
      context: .
      dockerfile: PredictionService/Api/Dockerfile
    container_name: predictionservice
    depends_on:
      sqlserver:
        condition: service_healthy
      monitoringservice:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MonitoringConnection: "Server=sqlserver;Database=MonitoringDb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;"
      MlNet__ModelPath: "/app/model.zip"
    volumes:
      - ml-models:/app

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: apigateway
    ports:
      - "5000:8080"
    depends_on:
      - userservice
      - productservice
      - orderservice
    environment:
      ASPNETCORE_ENVIRONMENT: Production

volumes:
  sqlserver-data:
  ml-models:
